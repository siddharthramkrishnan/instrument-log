<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Sheet Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  .controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
  .controls label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .controls input { width: 100%; max-width: 500px; padding: 9px 12px; border: 1.5px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 14px; }
  .controls select { padding: 9px 12px; border: 1.5px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 14px; margin-right: 10px; }
  .btn { background: #1a3a5c; color: white; border: none; border-radius: 6px; padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; margin-right: 10px; }
  .btn-outline { background: none; color: #1a3a5c; border: 2px solid #1a3a5c; }

  @media print {
    body { background: white; padding: 0; }
    .controls, .no-print { display: none !important; }
    .page-title { display: none; }
  }

  #sheet { display: flex; flex-wrap: wrap; gap: 0; background: white; }

  .qr-card {
    width: 200px;
    border: 1px solid #ccc;
    padding: 12px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .qr-card .dept {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    margin-bottom: 6px;
  }
  .dept-MFG { background: #e8f0f8; color: #1a3a5c; }
  .dept-DD  { background: #fdf0ee; color: #8b2c1e; }
  .qr-card canvas, .qr-card img { display: block; }
  .qr-card .inst-name {
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    margin-top: 7px;
    line-height: 1.3;
    max-height: 2.6em;
    overflow: hidden;
  }
  .qr-card .asset-id {
    font-family: monospace;
    font-size: 10px;
    color: #666;
    margin-top: 3px;
    text-align: center;
  }
  .qr-card .make-model {
    font-size: 9px;
    color: #888;
    text-align: center;
    margin-top: 2px;
    max-height: 1.8em;
    overflow: hidden;
  }
  .status { padding: 12px; color: #555; font-size: 14px; }
</style>
</head>
<body>
<h1 class="page-title no-print">QR Code Sheet Generator</h1>

<div class="controls no-print">
  <label>GitHub Pages Base URL (your deployed site)</label>
  <input type="text" id="baseUrl" placeholder="https://YOUR-USERNAME.github.io/instrument-log" value="https://siddharthramkrishnan.github.io/instrument-log">

  <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px;">
    <label style="margin:0">Filter: </label>
    <select id="deptFilter">
      <option value="all">All departments</option>
      <option value="MFG">MFG only</option>
      <option value="D&D">D&D only</option>
    </select>
    <button class="btn" onclick="generateQRs()">Generate QR Codes</button>
    <button class="btn btn-outline no-print" onclick="window.print()">🖨 Print / Save PDF</button>
  </div>
  <p style="font-size:12px; color:#888; margin-top:10px;">
    Set the base URL first, then click Generate. Each card has its own QR — scan to open the log form for that instrument.
  </p>
</div>

<div id="status" class="status no-print"></div>
<div id="sheet"></div>

function slugify(id) {
  return id.toLowerCase().replace(/\//g,'_').replace(/&/g,'_').replace(/ /g,'_');
}

async function generateQRs() {
  const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
  const dept = document.getElementById('deptFilter').value;
  const sheet = document.getElementById('sheet');
  const status = document.getElementById('status');

  if (!base || base.includes('YOUR-USERNAME')) {
    alert('Please set your GitHub Pages URL first (replace YOUR-USERNAME).');
    return;
  }

  const filtered = dept === 'all' ? INSTRUMENTS : INSTRUMENTS.filter(i => i.department === dept);
  status.textContent = `Generating ${filtered.length} QR codes…`;
  sheet.innerHTML = '';

  for (let i = 0; i < filtered.length; i++) {
    const inst = filtered[i];
    const url = `${base}/log/${slugify(inst.asset_id)}.html`;
    const dc = inst.department === 'D&D' ? 'DD' : 'MFG';
    const makeModel = [inst.make, inst.model].filter(Boolean).join(' · ');

    const card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML = `
      <span class="dept dept-${dc}">${inst.department}</span>
      <div id="qr-${i}"></div>
      <div class="inst-name">${inst.name}</div>
      <div class="asset-id">${inst.asset_id}</div>
      ${makeModel ? `<div class="make-model">${makeModel}</div>` : ''}
    `;
    sheet.appendChild(card);

    new QRCode(document.getElementById(`qr-${i}`), {
      text: url,
      width: 150,
      height: 150,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    // Yield to browser every 10 items
    if (i % 10 === 9) await new Promise(r => setTimeout(r, 0));
  }

  status.textContent = `✓ ${filtered.length} QR codes ready. Click "Print / Save PDF" to get your sheet.`;
}
