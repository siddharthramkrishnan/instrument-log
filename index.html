<style>
:root {
  --bg: #f5f4f0; --surface: #fff; --border: #d8d4cc;

  --tag-dd: #fdf0ee; --tag-dd-t: #8b2c1e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); }
header {
  background: var(--accent); color: white;
  padding: 28px 24px 20px;
  position: sticky; top: 0; z-index: 10;
}
header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; }
header p { font-size: 11px; opacity: 0.65; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
.tabs {
  display: flex; background: var(--accent);
  border-bottom: 2px solid rgba(255,255,255,0.15);
  padding: 0 24px; gap: 0;
}
.tab {
  padding: 10px 16px; font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.5); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: color 0.15s, border-color 0.15s;
}
.tab.active { color: white; border-color: white; }
.search { padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
.search input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 6px;
  padding: 10px 14px; font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px; background: var(--bg); outline: none;
}
.search input:focus { border-color: var(--accent); }
.list { padding: 0; }
.item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: var(--surface); text-decoration: none; color: inherit;
  transition: background 0.1s;
}
.item:hover { background: #f0ede8; }
.badge {
  flex-shrink: 0; font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; font-weight: 600; padding: 3px 6px; border-radius: 4px;
  letter-spacing: 0.06em; width: 36px; text-align: center;
}
.b-MFG { background: var(--tag-mfg); color: var(--tag-mfg-t); }
.b-DD  { background: var(--tag-dd);  color: var(--tag-dd-t); }
.info { flex: 1; min-width: 0; }
.name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meta { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chev { color: var(--border); font-size: 18px; flex-shrink: 0; }
.empty { text-align: center; padding: 48px; color: var(--muted); }
</style>

let tab = 'all';
function setTab(t, el) {
  tab = t;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  render();
}
function slugify(id) {
  return id.toLowerCase().replace(/\//g,'_').replace(/&/g,'_').replace(/ /g,'_');
}
function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const list = document.getElementById('list');
  let items = DATA.filter(i => {
    if (tab !== 'all' && i.department !== tab) return false;
    if (!q) return true;
    return i.name.toLowerCase().includes(q) || i.asset_id.toLowerCase().includes(q) || i.make.toLowerCase().includes(q);
  });
  if (!items.length) { list.innerHTML = '<div class="empty">No instruments found.</div>'; return; }
  list.innerHTML = items.map(i => {
    const dc = i.department === 'D&D' ? 'DD' : 'MFG';
    const meta = [i.asset_id, i.make, i.model].filter(Boolean).join(' · ');
    return `<a class="item" href="log/${slugify(i.asset_id)}.html">
      <span class="badge b-${dc}">${i.department}</span>
      <div class="info">
        <div class="name">${i.name}</div>
        <div class="meta">${meta}</div>
      </div>
      <span class="chev">›</span>
    </a>`;
  }).join('');
}
