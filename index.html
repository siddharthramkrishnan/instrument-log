.info{flex:1;min-width:0;}
.name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.meta{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chev{color:var(--border);font-size:18px;flex-shrink:0;}

let tab='all';
function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function slug(id){return id.toLowerCase().replace(/[\s\/&]+/g,'_').replace(/^_|_$/g,'');}
function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const list=document.getElementById('list');
  let items=DATA.filter(i=>{
    if(tab!=='all'&&i.department!==tab)return false;
    if(!q)return true;
    return i.name.toLowerCase().includes(q)||i.asset_id.toLowerCase().includes(q)||(i.room||'').toLowerCase().includes(q)||(i.make||'').toLowerCase().includes(q);
  });
  if(!items.length){list.innerHTML='<div class="empty">No instruments found.</div>';return;}
  list.innerHTML=items.map(i=>{
    const dc=i.department==='D&D'?'bd':'bm';
    const meta=[i.asset_id,i.room,i.make].filter(Boolean).join(' · ');
    return `<a class="item" href="log/${slug(i.asset_id)}.html"><span class="badge ${dc}">${i.department}</span><div class="info"><div class="name">${i.name}</div><div class="meta">${meta}</div></div><span class="chev">›</span></a>`;
  }).join('');
}
